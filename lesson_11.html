<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レッスン11｜AIマーケティングチームを作る — 実践ワーク</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f7fa; color: #1a1a2e; line-height: 1.7; }

  .lesson-banner {
    background: linear-gradient(135deg, #be185d 0%, #db2777 50%, #ec4899 100%);
    color: white; padding: 24px 28px; position: relative; overflow: hidden;
  }
  .lesson-banner::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .group-label {
    display: inline-block; background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9); font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; padding: 4px 12px; border-radius: 20px;
    margin-bottom: 10px; text-transform: uppercase;
  }
  .lesson-num { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
  .lesson-title { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
  .lesson-sub { font-size: 13px; color: rgba(255,255,255,0.7); }
  .progress-bar-wrap { margin-top: 16px; }
  .progress-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 5px; }
  .progress-bar { background: rgba(255,255,255,0.15); border-radius: 4px; height: 5px; }
  .progress-fill { background: #db2777; height: 5px; border-radius: 4px; transition: width 0.4s; }

  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }

  .intro-card {
    background: white; border-radius: 12px; padding: 20px 22px;
    margin-bottom: 20px; border-left: 4px solid #db2777;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .intro-card p { font-size: 14px; color: #444; }
  .intro-card strong { color: #db2777; }

  .video-card {
    background: white; border-radius: 12px; padding: 20px 22px;
    margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .video-card-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .video-icon {
    width: 36px; height: 36px; background: #db2777; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .video-icon svg { fill: white; width: 16px; height: 16px; }
  .video-meta { flex: 1; }
  .video-channel { font-size: 11px; color: #888; margin-bottom: 2px; }
  .video-name { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .time-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: #f0f4ff; color: #db2777; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; margin-bottom: 12px;
  }
  .time-badge::before { content: '⏱'; }
  .watch-range {
    background: #fff8e1; border: 1px solid #ffd54f; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 14px;
  }
  .watch-range-label { font-size: 11px; color: #f57f17; font-weight: 700; margin-bottom: 3px; }
  .watch-range-time { font-size: 16px; font-weight: 800; color: #e65100; font-family: 'Courier New', monospace; }
  .watch-range-note { font-size: 12px; color: #795548; margin-top: 4px; }
  .watch-btn {
    display: block; width: 100%; background: linear-gradient(135deg, #db2777, #be185d);
    color: white; text-align: center; padding: 14px; border-radius: 10px;
    font-size: 15px; font-weight: 700; text-decoration: none;
    transition: all 0.2s; border: none; cursor: pointer;
  }
  .watch-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(219,39,119,0.4); }

  .bridge-banner {
    background: linear-gradient(135deg, #f0fdf4 0%, #dbeafe 100%);
    border-left: 4px solid #db2777;
    border-radius: 12px; padding: 18px 20px; margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .bridge-banner-label { font-size: 12px; font-weight: 700; color: #db2777; margin-bottom: 6px; }
  .bridge-banner-text { font-size: 13px; color: #666; line-height: 1.6; }

  .jump-notice {
    background: #fef3c7; border-left: 4px solid #f59e0b;
    border-radius: 8px; padding: 12px 14px; margin-bottom: 16px;
    font-size: 12px; color: #92400e; font-weight: 600;
  }

  .claude-md-badge {
    background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
    border-left: 4px solid #db2777;
    border-radius: 12px; padding: 18px 20px; margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .claude-md-badge-title { font-size: 13px; font-weight: 700; color: #db2777; margin-bottom: 8px; }
  .claude-md-badge-text { font-size: 13px; color: #666; line-height: 1.6; }

  .checklist-section {
    background: white; border-radius: 12px; padding: 20px 22px;
    margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .checklist-title {
    font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 2px solid #f3f4f6;
  }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px;
    cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.15s;
  }
  .check-item:hover { background: #fce7f3; }
  .check-item input[type="checkbox"] { display: none; }
  .check-box {
    width: 22px; height: 22px; border: 2px solid #d0d5e8; border-radius: 6px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-top: 1px;
  }
  .check-item.checked .check-box {
    background: #db2777; border-color: #db2777;
  }
  .check-item.checked .check-box::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }
  .check-label { font-size: 14px; color: #444; line-height: 1.5; }
  .check-item.checked .check-label { color: #888; text-decoration: line-through; }

  .complete-btn {
    display: block; width: 100%; background: linear-gradient(135deg, #db2777, #be185d);
    color: white; text-align: center; padding: 16px; border-radius: 12px;
    font-size: 16px; font-weight: 700; border: none; cursor: pointer;
    margin-bottom: 16px; transition: all 0.2s;
  }
  .complete-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(219,39,119,0.4); }
  .complete-btn.done { background: #2dc653; }

  .next-btn {
    display: block; background: white; color: #db2777; text-align: center;
    padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700;
    border: 2px solid #db2777; text-decoration: none; transition: all 0.2s;
  }
  .next-btn:hover { background: #db2777; color: white; }

  .nav-row {
    display: flex; gap: 12px; margin-top: 16px;
  }
  .prev-btn, .next-btn { flex: 1; }
  .prev-btn {
    background: white; color: #db2777; text-align: center;
    padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700;
    border: 2px solid #db2777; text-decoration: none; transition: all 0.2s;
  }
  .prev-btn:hover { background: #db2777; color: white; }

  .complete-banner {
    display: none; background: #2dc653;
    color: white; text-align: center; padding: 16px; border-radius: 12px;
    font-size: 15px; font-weight: 700; margin-bottom: 16px;
  }
  .complete-banner.show { display: block; }

  .video-note {
    background: #fce7f3; border-left: 4px solid #db2777;
    border-radius: 8px; padding: 10px 14px; margin-top: 10px;
    font-size: 12px; color: #555;
  }
</style>
</head>
<body>

<div class="lesson-banner">
  <div class="group-label">設計編</div>
  <div class="lesson-num">レッスン 11 / 12</div>
  <div class="lesson-title">AIマーケティングチームを作る — 実践ワーク</div>
  <div class="lesson-sub">要件定義・設計・実装・レビューをAIに分担させる</div>
  <div class="progress-bar-wrap">
    <div class="progress-label">講座全体の進捗</div>
    <div class="progress-bar"><div class="progress-fill" id="globalProgress" style="width:0%"></div></div>
  </div>
</div>

<div class="container">

  <!-- 動画カード -->
  <div class="video-card">
    <div class="video-card-header">
      <div class="video-icon">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="video-meta">
        <div class="video-channel">AIでサボろうch</div>
        <div class="video-name">AIツール3段階使い分け術｜役割分担でマーケティングを自動化する</div>
      </div>
    </div>
    <div class="time-badge">視聴時間：約7.5分</div>
    <div class="watch-range">
      <div class="watch-range-label">📍 この区間を再生してください</div>
      <div class="watch-range-time">09:43 〜 17:15</div>
      <div class="watch-range-note">レッスン4で見たツール比較の後半。なぜそう使い分けるかの理由論。要件定義→設計→実装→レビューをAIに分担させる発想が学べます</div>
    </div>
    <a class="watch-btn" href="https://www.youtube.com/watch?v=EwS4MUIYJjM" target="_blank" rel="noopener">
      ▶ YouTubeで視聴する
    </a>
    <div class="video-note">3段階使い分けの実務的な理由が理解できます</div>
  </div>

  <!-- チェックリスト -->
  <div class="checklist-section">
    <div class="checklist-title">✅ このレッスンのチェックリスト</div>

    <label class="check-item" id="ci-11-1">
      <input type="checkbox">
      <div class="check-box"></div>
      <span class="check-label">AIツールを「要件定義・設計・実装・レビュー」の役割で使い分けるイメージが持てた</span>
    </label>
    <label class="check-item" id="ci-11-2">
      <input type="checkbox">
      <div class="check-box"></div>
      <span class="check-label">自分のビジネスでのAI役割分担案を1つ作れた</span>
    </label>
    <label class="check-item" id="ci-11-3">
      <input type="checkbox">
      <div class="check-box"></div>
      <span class="check-label">「3段階の使い分け」（Antigravity→Claude Code→Codex）の理由を説明できる</span>
    </label>
    <label class="check-item" id="ci-11-4">
      <input type="checkbox">
      <div class="check-box"></div>
      <span class="check-label">次の一手として「何から始めるか」が具体的に決まった</span>
    </label>
  </div>

  <!-- 完了ボタン -->
  <div class="complete-banner" id="completeBanner">🎉 レッスン11 完了！</div>
  <button class="complete-btn" id="completeBtn" onclick="markComplete()">
    レッスン11を完了にする
  </button>

  <!-- ナビゲーション -->
  <div class="nav-row">
    <a class="prev-btn" href="lesson_10.html">← 前へ</a>
    <a class="next-btn" href="lesson_12.html">次へ →</a>
  </div>

</div>

<script>
const LESSON = 11;
const TOTAL = 12;
const KEY = 'ai-agent-lesson-' + LESSON + '-complete';

function updateProgress() {
  let done = 0;
  for (let i = 1; i <= TOTAL; i++) {
    if (localStorage.getItem('ai-agent-lesson-' + i + '-complete') === 'true') done++;
  }
  const pct = Math.round((done / TOTAL) * 100);
  document.getElementById('globalProgress').style.width = pct + '%';
}

function markComplete() {
  localStorage.setItem(KEY, 'true');
  const btn = document.getElementById('completeBtn');
  btn.classList.add('done');
  btn.textContent = '✓ 完了済み';
  document.getElementById('completeBanner').classList.add('show');
  updateProgress();
}

document.querySelectorAll('.check-item').forEach(function(item) {
  item.addEventListener('click', function() {
    this.classList.toggle('checked');
  });
});

if (localStorage.getItem(KEY) === 'true') {
  const btn = document.getElementById('completeBtn');
  btn.classList.add('done');
  btn.textContent = '✓ 完了済み';
  document.getElementById('completeBanner').classList.add('show');
}
updateProgress();
</script>
</body>
</html>
